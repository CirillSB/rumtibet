<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Описание проекта">
  <title>RumTibet</title>
  <link rel="stylesheet" href="css/style.min.css">
</head>

<body>
  <div class="wrapper">
    <div class="overlay visually-hidden"></div>
    <header class="main-header">
      <div class="container">
        <div class="main-header__inner">
          <svg class="logo" width="137" height="72" viewBox="0 0 137 72">
            <use xlink:href="img/sprite.svg#logo"></use>
          </svg>
          <nav class="navigation">
            <ul class="navigation__list">
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Главная
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Про гида
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Программа тура
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Стоимость
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Блог
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Контакты
                </a>
              </li>
            </ul>
            <button class="menu-button visually-hidden">
              <span class="visually-hidden">
                Кнопка показать или скрыть меню
              </span>
              <svg class="burger" width="30" height="30" viewBox="0 0 30 30">
                <use class="burger__image" xlink:href="img/sprite.svg#burger"></use>
              </svg>
            </button>
          </nav>
          <a class="main-link only-desktop-visible" href="#">
            Консультация
          </a>
        </div>
      </div>
    </header>
    <!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
    <main>
      <section class="promo">
        <div class="container">
          <h2 class="title">
            Насладись<br class="only-mobile-visible"> прогулкой в&nbsp;<span class="only-desktop-visible">горах</span><span class="only-mobile-visible">горы</span><br class="only-mobile-visible">
            с&nbsp;командой<br class="only-mobile-visible"> единомышленников
          </h2>
          <form class="main-form" action="#">
            <div class="main-form__item main-form__item--inputs">
              <div class="main-form__input-field" data-placeholder>
                <select name="custom-select" id="location-select" data-form-field data-custom-fields data-shell-contents>
                  <option value="1">
                    Лысая гора
                  </option>
                  <option value="2">
                    Ведьмина гора
                  </option>
                  <option value="3">
                    Горбатая гора
                  </option>
                </select>
                <label for="location-select">
                  выберите из списка
                </label>
              </div>
              <div class="main-form__input-field" data-placeholder>
                <input type="date" name="date" id="date-input" data-form-field data-custom-fields data-shell-contents>
                <label for="date-input">
                  укажите диапазон
                </label>
              </div>
              <div class="main-form__input-field" data-placeholder>
                <select class="custom-select" name="custom-select" id="participants-select" data-form-field data-custom-fields data-shell-contents>
                  <option value="4">
                    4
                  </option>
                  <option value="5">
                    5
                  </option>
                  <option value="6">
                    6
                  </option>
                  <option value="7">
                    7
                  </option>
                  <option value="8">
                    8
                  </option>
                  <option value="9">
                    9
                  </option>
                </select>
                <label for="participants-select">
                  укажите диапазон
                </label>
              </div>
            </div>
            <div class="main-form__item main-form__item--buttons">
              <button type="submit">
                Найти программу
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>
    <footer>
      <div class="container">
      </div>
    </footer>
  </div>
  <!-- Модалки -->
  <div class="modal modal--menu" data-modal="feedback">
    <div class="modal__wrapper">
      <div class="modal__overlay" data-close-modal></div>
      <div class="modal__content">
        <p class="modal__description">Обычная модалка</p>
        <button class="modal__close-btn btn-reset" type="button" aria-label="Закрыть попап" data-close-modal>
          <svg width="15" height="15">
            <use xlink:href="img/sprite.svg#icon-close"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <div class="modal modal--preload" data-modal="feedback">
    <div class="modal__wrapper">
      <div class="modal__overlay" data-close-modal></div>
      <div class="modal__content">
        <p class="modal__description">Обычная модалка</p>
        <button class="modal__close-btn btn-reset" type="button" aria-label="Закрыть попап" data-close-modal>
          <svg width="15" height="15">
            <use xlink:href="img/sprite.svg#icon-close"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <div class="modal modal--preload modal--fit-content modal--no-scale" data-modal="success">
    <div class="modal__wrapper">
      <div class="modal__overlay" data-close-modal></div>
      <div class="modal__content">
        <p class="modal__description">Размер этой модалки зависит от ширины контента,<br> отключена анимация-скейл</p>
        <button class="modal__close-btn btn-reset" type="button" aria-label="Закрыть попап" data-close-modal>
          <svg width="15" height="15">
            <use xlink:href="img/sprite.svg#icon-close"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <template id="custom-icon">
    <svg>
      <use xlink:href="../img/sprite.svg#arrow-down"></use>
    </svg>
  </template>
  <script src="js/vendor.min.js"></script>
  <script src="js/main.min.js"></script>
</body>

</html>
