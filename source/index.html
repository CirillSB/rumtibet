<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Описание проекта">
  <title>RumTibet</title>
  <link rel="stylesheet" href="css/style.min.css">
</head>

<body>
  <div class="wrapper">
    <header class="main-header">
      <div class="container">
        <div class="main-header__inner">
          <svg class="logo" width="137" height="72">
            <use xlink:href="img/sprite.svg#logo"></use>
          </svg>
          <nav class="navigation">
            <ul class="navigation__list">
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Главная
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Про гида
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Программа тура
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Стоимость
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Блог
                </a>
              </li>
              <li class="navigation__item">
                <a class="navigation__link" href="#">
                  Контакты
                </a>
              </li>
            </ul>
          </nav>
          <a class="main-link" href="#">
            Консультация
          </a>
        </div>
      </div>
    </header>
    <!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
    <main>

    </main>
    <footer>
      <div class="container">
        
      </div>
    </footer>
  </div>
  <!-- Модалки -->
  <div class="modal modal--preload" data-modal="feedback">
    <div class="modal__wrapper">
      <div class="modal__overlay" data-close-modal></div>
      <div class="modal__content">
        <p class="modal__description">Обычная модалка</p>
        <button class="modal__close-btn btn-reset" type="button" aria-label="Закрыть попап" data-close-modal>
          <svg width="15" height="15">
            <use xlink:href="img/sprite.svg#icon-close"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <div class="modal modal--preload modal--fit-content modal--no-scale" data-modal="success">
    <div class="modal__wrapper">
      <div class="modal__overlay" data-close-modal></div>
      <div class="modal__content">
        <p class="modal__description">Размер этой модалки зависит от ширины контента,<br> отключена анимация-скейл</p>
        <button class="modal__close-btn btn-reset" type="button" aria-label="Закрыть попап" data-close-modal>
          <svg width="15" height="15">
            <use xlink:href="img/sprite.svg#icon-close"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <script src="js/vendor.min.js"></script>
  <script src="js/main.min.js"></script>
</body>

</html>
